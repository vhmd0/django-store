<button
  {% if type %}type="{{ type }}"{% else %}type="button"{% endif %}
  {{ attrs }}
  class="
    btn
    {% if variant == 'primary' or not variant %}
      btn-primary bg-indigo-600 hover:bg-indigo-700 text-white border-0
    {% elif variant == 'secondary' %}
      btn-outline border-base-300 hover:bg-base-200 hover:border-base-300 text-base-content
    {% elif variant == 'outline' %}
      btn-outline
    {% elif variant == 'ghost' %}
      btn-ghost
    {% endif %}
    {% if size == 'sm' %}
      btn-sm
    {% elif size == 'lg' %}
      btn-lg
    {% endif %}
    rounded-full font-bold
    {% if w_full %}w-full{% endif %}
    {{ class }}
  "
>
  {{ slot }}
</button>

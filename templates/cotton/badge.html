<span
  {{ attrs }}
  class="
    inline-flex items-center text-[10px] font-black uppercase tracking-[0.2em]
    {% if variant == 'success' or variant == 'instock' %}
      text-emerald-600
    {% elif variant == 'danger' or variant == 'soldout' %}
      text-rose-600
    {% elif variant == 'warning' %}
      text-amber-600
    {% elif variant == 'info' %}
      text-sky-600
    {% elif variant == 'primary' %}
      text-slate-900
    {% else %}
      text-slate-400
    {% endif %}
    {{ class }}
  "
>
  {{ slot }}
</span>

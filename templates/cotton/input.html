<div class="form-control w-full space-y-2 {{ wrapper_class }}">
  {% if label %}
    <label class="label pb-0">
      <span class="label-text font-bold uppercase tracking-widest text-xs text-base-content/70">{{ label }}</span>
    </label>
  {% endif %}
  <div class="relative">
    <input
      {{ attrs }}
      {% if type %}type="{{ type }}"{% else %}type="text"{% endif %}
      {% if name %}name="{{ name }}"{% endif %}
      {% if value %}value="{{ value }}"{% endif %}
      {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
      class="input input-bordered w-full rounded-2xl bg-base-50 shadow-sm focus:border-primary focus:ring-1 focus:ring-primary h-14 text-base {{ class }}"
    />
    {{ slot }}
  </div>
  {% if error %}
    <p class="text-error text-[10px] font-bold mt-1 px-2">{{ error }}</p>
  {% elif help_text %}
    <p class="text-base-content/40 text-[10px] font-bold uppercase tracking-widest mt-1 px-2">{{ help_text }}</p>
  {% endif %}
</div>

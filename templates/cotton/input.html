<div class="space-y-2 {{ wrapper_class }}">
  {% if label %}
    <label class="block text-xs font-bold text-slate-700 ml-1">{{ label }}</label>
  {% endif %}
  <div class="relative">
    <input
      {{ attrs }}
      {% if type %}type="{{ type }}"{% else %}type="text"{% endif %}
      {% if name %}name="{{ name }}"{% endif %}
      {% if value %}value="{{ value }}"{% endif %}
      {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
      class="
        w-full h-12 px-4 rounded-xl border border-slate-200 bg-white text-sm text-slate-900 font-medium
        placeholder:text-slate-400 placeholder:font-normal
        focus:outline-none focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 transition-all duration-300
        disabled:bg-slate-50 disabled:text-slate-500 disabled:cursor-not-allowed
        {{ class }}
      "
    />
    {{ slot }}
  </div>
  {% if error %}
    <p class="text-xs text-rose-500 ml-1 font-medium">{{ error }}</p>
  {% elif help_text %}
    <p class="text-xs text-slate-500 ml-1">{{ help_text }}</p>
  {% endif %}
</div>

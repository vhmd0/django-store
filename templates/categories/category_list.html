{% extends 'base.html' %}

{% block title %}Categories - Smart S3r{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto lg:w-[70%] px-6 py-12 lg:py-24">
  <div class="mb-16">
    <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-2">Explore Our Collection</h2>
    <h1 class="text-4xl font-black text-slate-900 tracking-tight">Shop by Category</h1>
    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-4">{{ categories.count }} categories available</p>
  </div>

  <div id="category-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-8">
    {% include 'categories/partials/category_list.html' %}
  </div>
</div>
{% endblock %}

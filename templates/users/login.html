{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Login" %} - Smart S3r{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center p-4 py-12 lg:py-24 relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute -top-40 -right-40 w-96 h-96 bg-indigo-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
  <div class="absolute top-40 -left-20 w-72 h-72 bg-purple-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

  <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-200/50 p-8 sm:p-12 relative z-10">
    <div class="text-center mb-10">
      <div class="badge badge-primary badge-outline mb-4 px-3 py-2 rounded-full font-bold uppercase tracking-widest text-[10px]">{% trans "Account Access" %}</div>
      <h1 class="text-3xl font-black text-base-content tracking-tight">{% trans "Login" %}</h1>
    </div>
    
    <form method="POST" class="space-y-6">
      {% csrf_token %}
      
      <div class="form-control w-full space-y-2">
        <label for="id_username" class="label pb-0">
          <span class="label-text font-bold uppercase tracking-widest text-xs text-base-content/70">{% trans "Username" %}</span>
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-base-content/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </div>
          <input id="id_username" name="username" type="text" required class="input input-bordered w-full pl-12 rounded-2xl bg-base-50 shadow-sm focus:border-primary focus:ring-1 focus:ring-primary h-14" placeholder="{% trans 'Username' %}">
        </div>
      </div>
      
      <div class="form-control w-full space-y-2">
        <div class="flex justify-between items-center pb-0">
          <label for="id_password" class="label py-0">
            <span class="label-text font-bold uppercase tracking-widest text-xs text-base-content/70">{% trans "Password" %}</span>
          </label>
          <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-base-content/50 hover:text-indigo-600 transition-colors">{% trans "Forgot?" %}</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-base-content/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <input id="id_password" name="password" type="password" required class="input input-bordered w-full pl-12 rounded-2xl bg-base-50 shadow-sm focus:border-primary focus:ring-1 focus:ring-primary h-14" placeholder="••••••••">
        </div>
      </div>

      <div class="pt-4 space-y-6">
        <button type="submit" class="btn btn-primary bg-indigo-600 hover:bg-indigo-700 text-white w-full rounded-2xl h-14 text-base font-bold shadow-md border-0 group">
          {% trans "Sign In" %}
          <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
        
        <div class="border-t border-base-200 pt-6 text-center space-y-4">
          <p class="text-[11px] font-bold uppercase tracking-widest text-base-content/50">{% trans "New to Smart S3r?" %}</p>
          <a href="{% url 'users:register' %}" class="btn btn-outline border-base-300 hover:bg-base-200 hover:border-base-300 w-full rounded-2xl h-14 text-sm font-bold text-base-content">
            {% trans "Create Account" %}
          </a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
